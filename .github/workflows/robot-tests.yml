name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Display Robot Framework version
        run: |
          python -c "import robot; print(f'Robot Framework {robot.__version__}')"

      - name: Check Python and pip
        run: |
          python --version
          pip --version

      - name: Check Robot Framework installation
        run: |
          python -c "import robot; print(f'Robot Framework {robot.__version__}')"

      - name: Check Chrome installation
        run: |
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Check Selenium installation
        run: |
          python -c "import selenium; print(f'Selenium {selenium.__version__}')"

      - name: Prepare reports directory
        run: mkdir -p results

      - name: Display workspace files
        run: |
          pwd
          ls -la
          find tests resources -maxdepth 2 -type f

      - name: Run Robot Framework tests
        run: robot -d results tests

      - name: Upload Robot Framework reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: robot-framework-reports
          path: results/
          retention-days: 7
